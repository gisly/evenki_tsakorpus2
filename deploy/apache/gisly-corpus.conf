# =============================================================================
# Apache snippet: proxy /corpus to the docker stack.
#
# Add the contents of this file inside your existing <VirtualHost *:443>
# for gisly.net (the HTTPS vhost with your TLS cert).
#
# Required modules (one-time):
#   sudo a2enmod proxy proxy_http headers rewrite
#   sudo systemctl restart apache2
#
# Sanity check before reloading:
#   sudo apache2ctl configtest
# =============================================================================

# Trailing-slash normalization: /corpus -> /corpus/
# Without this, relative URLs in tsakorpus templates resolve against
# https://gisly.net/ instead of https://gisly.net/corpus/ and break.
RewriteEngine On
RewriteRule ^/corpus$ /corpus/ [R=301,L]

# Forward everything under /corpus/ to the docker nginx on 127.0.0.1:8080.
<Location "/corpus/">
    ProxyPass        "http://127.0.0.1:8080/corpus/"
    ProxyPassReverse "http://127.0.0.1:8080/corpus/"

    # Tell the Flask app it's behind a TLS-terminating proxy at /corpus.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Prefix "/corpus"

    ProxyTimeout 120
</Location>

ProxyRequests Off
ProxyPreserveHost On
