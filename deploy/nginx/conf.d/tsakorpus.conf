# Docker-internal nginx. In production, host Apache terminates TLS and
# forwards /corpus to this container on 127.0.0.1:8080. In dev, you hit
# this container directly at http://localhost:8080/corpus/.
#
# Responsibilities:
#   * Serve /corpus/media/ directly from /srv/media/evenki/
#   * Cache /corpus/static/ for 1 day
#   * Protect /corpus/admin with HTTP basic auth
#   * Rate-limit search endpoints
#   * Proxy the rest under /corpus/ to the Flask app

limit_req_zone $binary_remote_addr zone=corpus_limit:10m rate=10r/s;

# Trust upstream proxies (host Apache in prod, or just localhost in dev)
# for X-Forwarded-* headers.
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 127.0.0.1;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Use Docker's embedded DNS at runtime instead of resolving 'tsakorpus'
    # once at startup. Without this, nginx refuses to start when the app
    # container is briefly unavailable (e.g. during reboot warmup) and
    # caches forever once resolved. With this, lookups happen per-request,
    # so nginx tolerates transient app outages and stays up.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $tsakorpus_upstream "tsakorpus:7342";

    # Redirect /corpus -> /corpus/ so relative URLs in templates resolve correctly.
    location = /corpus {
        return 301 /corpus/;
    }

    # ---- Media: served directly ----
    # /corpus/media/<path>  ->  /srv/media/evenki/<path>
    location /corpus/media/ {
        alias /srv/media/evenki/;
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        access_log off;

        # Allowlist of media extensions
        location ~* \.(mp3|wav|ogg|m4a|opus|flac|mp4|webm|ogv|mov|jpg|jpeg|png|gif|svg|webp)$ {
            try_files $uri =404;
        }
        location ~ /\. { deny all; }
        return 404;
    }

    # ---- Static assets ----
    location /corpus/static/ {
        proxy_pass http://$tsakorpus_upstream;
        proxy_cache_valid 200 1d;
        expires 1d;
        add_header Cache-Control "public" always;
        access_log off;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # ---- /corpus/admin -- basic auth ----
    location /corpus/admin {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/conf.d/htpasswd;

        proxy_pass http://$tsakorpus_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /corpus;
        proxy_set_header Connection "";
    }

    # ---- Everything else under /corpus -> Flask ----
    location /corpus/ {
        limit_req zone=corpus_limit burst=20 nodelay;

        proxy_pass http://$tsakorpus_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Prefix /corpus;
        proxy_set_header Connection "";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 5s;
    }

    location / {
        return 404;
    }

    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}